services:

  backend:
    build: ./backend
    container_name: study_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: study_frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules
    
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    depends_on:
      - backend

      

  postgres:
    image: postgres:16
    container_name: study_postgres
    environment:
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: study_pass
      POSTGRES_DB: study_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: